<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strategy House — Login</title>
<style>
  :root{--navy:#051C2C;--sky:#22A3DF;--ink:#1a2b38;--muted:#6b7d8a;--line:#c9d6df}
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;
       background:var(--navy);font-family:"Pretendard","SUIT",-apple-system,Segoe UI,Roboto,Arial,sans-serif}
  .card{background:#fff;border-radius:14px;padding:40px 36px;width:100%;max-width:400px;box-shadow:0 24px 60px rgba(0,0,0,.35)}
  .logo{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px}
  h1{font-size:22px;font-weight:700;color:var(--navy);margin-bottom:6px}
  .sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
  label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px}
  input{width:100%;padding:10px 13px;border:1.5px solid var(--line);border-radius:8px;
        font:15px inherit;color:var(--ink);outline:none;transition:.15s}
  input:focus{border-color:var(--sky);box-shadow:0 0 0 3px rgba(34,163,223,.12)}
  input.otp{font-size:28px;font-weight:700;letter-spacing:10px;text-align:center;padding:12px}
  button{width:100%;padding:11px;background:var(--navy);color:#fff;border:none;border-radius:8px;
         font:600 15px inherit;cursor:pointer;transition:.15s;margin-top:16px}
  button:hover{background:#0a2d47}
  button:disabled{opacity:.5;cursor:not-allowed}
  .err{color:#d93025;font-size:13px;margin-top:10px;min-height:18px}
  .back{font-size:12px;color:var(--sky);cursor:pointer;text-decoration:underline;margin-top:14px;display:inline-block}
  #step2{display:none}
  .hint{font-size:12px;color:var(--muted);margin-top:8px}
  .timer{font-size:12px;color:var(--muted);margin-top:10px}
  .timer span{color:var(--sky);font-weight:600}
</style>
</head>
<body>
<div class="card">
  <div class="logo">SK Shieldus · BCG</div>
  <h1>Strategy House</h1>

  <!-- Step 1: Email -->
  <div id="step1">
    <p class="sub">초대받은 이메일 주소를 입력하시면 로그인 코드를 발송합니다.</p>
    <label for="email">이메일</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    <button id="btnSend">코드 발송</button>
    <div class="err" id="err1"></div>
  </div>

  <!-- Step 2: OTP -->
  <div id="step2">
    <p class="sub">이메일로 발송된 6자리 코드를 입력하세요.</p>
    <label for="otp">인증 코드</label>
    <input type="text" id="otp" class="otp" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
    <div class="timer" id="timer">유효시간: <span id="countdown">10:00</span></div>
    <button id="btnVerify">확인</button>
    <div class="err" id="err2"></div>
    <span class="back" id="btnBack">← 이메일 다시 입력</span>
  </div>
</div>

<script>
let otpToken = '';
let timerInterval = null;

const $ = id => document.getElementById(id);
const show = (el, v) => el.style.display = v ? '' : 'none';

$('btnSend').onclick = async () => {
  const email = $('email').value.trim();
  if (!email) { $('err1').textContent = '이메일을 입력해 주세요.'; return; }
  $('btnSend').disabled = true;
  $('err1').textContent = '';

  try {
    const r = await fetch('/api/request-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '오류가 발생했습니다.');

    otpToken = data.otpToken || '';
    show($('step1'), false);
    show($('step2'), true);
    $('otp').focus();
    startTimer(600);
  } catch (e) {
    $('err1').textContent = e.message;
  } finally {
    $('btnSend').disabled = false;
  }
};

$('btnVerify').onclick = async () => {
  const otp = $('otp').value.trim();
  if (otp.length !== 6) { $('err2').textContent = '6자리 코드를 입력해 주세요.'; return; }
  $('btnVerify').disabled = true;
  $('err2').textContent = '';

  try {
    const r = await fetch('/api/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ otp, otpToken }),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || '인증에 실패했습니다.');

    clearInterval(timerInterval);
    window.location.href = '/';
  } catch (e) {
    $('err2').textContent = e.message;
    $('btnVerify').disabled = false;
  }
};

$('otp').addEventListener('input', e => {
  e.target.value = e.target.value.replace(/\D/g, '');
  if (e.target.value.length === 6) $('btnVerify').click();
});

$('btnBack').onclick = () => {
  clearInterval(timerInterval);
  show($('step1'), true);
  show($('step2'), false);
  $('otp').value = '';
  $('err2').textContent = '';
};

function startTimer(seconds) {
  clearInterval(timerInterval);
  let remaining = seconds;
  const el = $('countdown');
  const update = () => {
    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    el.textContent = `${m}:${s}`;
    if (remaining <= 0) {
      clearInterval(timerInterval);
      $('err2').textContent = '코드가 만료됐습니다. 이메일을 다시 입력해 주세요.';
      $('btnVerify').disabled = true;
    }
    remaining--;
  };
  update();
  timerInterval = setInterval(update, 1000);
}
</script>
</body>
</html>
